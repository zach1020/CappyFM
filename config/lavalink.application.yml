server:
  port: 2333

lavalink:
  server:
    password: "${LAVALINK_SERVER_PASSWORD:change-me}"
    sources:
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      nico: true
      # Only bot-generated internal DJ audio URLs reach this source. User URLs
      # remain provider-allowlisted by CappyFM before Lavalink sees them.
      http: true
      local: false
    filters:
      volume: true
    # Keep a deeper native audio cushion for brief local CPU/GC stalls and use
    # reusable frame storage to reduce allocation pressure during playback.
    nonAllocatingFrameBuffer: true
    bufferDurationMs: 1000
    frameBufferDurationMs: 5000
    opusEncodingQuality: 8
    resamplingQuality: LOW
    gc-warnings: true
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      snapshot: false
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.3"
      repository: "https://maven.lavalink.dev/releases"
      snapshot: false

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    # Prefer a broad set of playback-capable clients. YouTube can allow a
    # search result yet reject a particular client when it requests audio from
    # a cloud-hosted IP, so each client below is an intentional fallback.
    clients:
      - TVHTML5_SIMPLY
      - IOS
      - ANDROID_VR
      - WEB
      - MWEB
      - WEBEMBEDDED
  lavasrc:
    providers:
      - "ytsearch:\"%ISRC%\""
      - "ytsearch:%QUERY%"
    sources:
      spotify: true
      applemusic: true
      deezer: false
      yandexmusic: false
      flowerytts: false
      youtube: false
      vkmusic: false
      tidal: false
      qobuz: false
      ytdlp: false
    lyrics-sources:
      spotify: false
      deezer: false
      youtube: false
      yandexmusic: false
      vkmusic: false
    spotify:
      clientId: "${SPOTIFY_CLIENT_ID:}"
      clientSecret: "${SPOTIFY_CLIENT_SECRET:}"
      countryCode: "US"
      playlistLoadLimit: 1
      albumLoadLimit: 2
      resolveArtistsInSearch: true
      localFiles: false
      preferAnonymousToken: false
    applemusic:
      countryCode: "US"
      mediaAPIToken: "${APPLE_MUSIC_API_TOKEN:}"
      playlistLoadLimit: 1
      albumLoadLimit: 1

logging:
  level:
    root: INFO
    lavalink: INFO
