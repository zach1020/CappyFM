server:
  port: 2333

lavalink:
  server:
    password: "${LAVALINK_SERVER_PASSWORD:change-me}"
    sources:
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      nico: true
      # Only bot-generated internal DJ audio URLs reach this source. User URLs
      # remain provider-allowlisted by CappyFM before Lavalink sees them.
      http: true
      local: false
    filters:
      volume: true
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      snapshot: false
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.3"
      repository: "https://maven.lavalink.dev/releases"
      snapshot: false

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    # Explicitly prefer clients that can return playable audio streams. The
    # defaults can successfully resolve radio metadata yet fail when the
    # selected client is asked to stream from a cloud-hosted IP.
    clients:
      - WEB
      - MWEB
      - ANDROID_VR
      - WEBEMBEDDED
  lavasrc:
    providers:
      - "ytsearch:\"%ISRC%\""
      - "ytsearch:%QUERY%"
    sources:
      spotify: true
      applemusic: true
      deezer: false
      yandexmusic: false
      flowerytts: false
      youtube: false
      vkmusic: false
      tidal: false
      qobuz: false
      ytdlp: false
    lyrics-sources:
      spotify: false
      deezer: false
      youtube: false
      yandexmusic: false
      vkmusic: false
    spotify:
      clientId: "${SPOTIFY_CLIENT_ID:}"
      clientSecret: "${SPOTIFY_CLIENT_SECRET:}"
      countryCode: "US"
      playlistLoadLimit: 1
      albumLoadLimit: 2
      resolveArtistsInSearch: true
      localFiles: false
      preferAnonymousToken: false
    applemusic:
      countryCode: "US"
      mediaAPIToken: "${APPLE_MUSIC_API_TOKEN:}"
      playlistLoadLimit: 1
      albumLoadLimit: 1

logging:
  level:
    root: INFO
    lavalink: INFO
